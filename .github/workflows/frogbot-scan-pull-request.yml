name: "Frogbot Scan Pull Request"
on:
  pull_request_target:
    types: [opened, synchronize]
    branches: [main, develop, feature]
permissions:
  pull-requests: write
  contents: read

jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    environment: frogbot
    steps:
      - uses: jfrog/frogbot@v2
        env:
          JFROG_CLI_LOG_LEVEL: "DEBUG"
          JF_URL: ${{ secrets.FROGBOT_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.FROGBOT_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ties violation reporting to the Security Policy created for this demo.
          JF_WATCHES: "frogbot-demo-npm-watch"
          # Reports this scan into Xray's per-repo "Scans List" UI, same as scan-repository.
          JF_USE_CONFIG_PROFILE: "TRUE"
