name: "Frogbot Scan Repository"
on:
  workflow_dispatch:
  schedule:
    # Scans every branch once a day at 00:00 GMT.
    - cron: "0 0 * * *"
  push:
    branches:
      - main
      - develop
      - feature
permissions:
  pull-requests: write
  contents: write
  security-events: write

jobs:
  scan-repository:
    runs-on: ubuntu-latest
    name: Scan Repository (${{ matrix.branch }} branch)
    environment: frogbot
    strategy:
      fail-fast: false
      matrix:
        branch: ["main", "develop", "feature"]
    steps:
      - uses: jfrog/frogbot@v2
        env:
          JFROG_CLI_LOG_LEVEL: "DEBUG"
          JF_URL: ${{ secrets.FROGBOT_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.FROGBOT_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          # Single PR per branch with all fixes, instead of one PR per vulnerability.
          JF_GIT_AGGREGATE_FIXES: "TRUE"
          # Ties violation reporting to the Security Policy created for this demo.
          JF_WATCHES: "frogbot-demo-npm-watch"
          # Reports this scan into Xray's per-repo "Scans List" UI (Xray > Scans
          # List > github.com > <org> > <repo>), in addition to the Watches &
          # Policies > Violations view. Not related to Frogbot v3's Config
          # Profile scan engine - v2 doesn't use that code path at all.
          JF_USE_CONFIG_PROFILE: "TRUE"
